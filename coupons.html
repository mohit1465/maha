<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coupons - Maharaja Dry Fruits</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="MAHARAJA logo.svg">
    
    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8KQYRHMSKN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8KQYRHMSKN');
    </script>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body data-page="coupons">
    <header class="header">
        <div class="top-header">
            <div class="logo-container">
                <img src="assets/MAHARAJA logo.png" alt="Maharaja Logo" class="logo">
            </div>
            <div class="brand-name">
                <h1>MAHARAJA</h1>
                <p class="tagline">Dry Fruit</p>
            </div>
            <div class="header-icons">
                <a href="search.html" class="icon" data-section="search"><i class="fas fa-search"></i></a>
                <a href="wishlist.html" class="icon" data-section="wishlist"><i class="fas fa-heart"></i></a>
                <a href="cart.html" class="icon" data-section="cart">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count">0</span>
                </a>
                <a href="login.html" class="icon" data-section="profile"><i class="fas fa-user"></i></a>
            </div>
        </div>
        <nav class="main-nav">
            <ul class="nav-links">
                <li><a href="index.html" data-section="home">Home</a></li>
                <li class="dropdown">
                    <a href="#" class="dropbtn">Shop <i class="fas fa-chevron-down"></i></a>
                    <div class="dropdown-content">
                        <a href="search.html" data-section="search">All</a>
                    </div>
                </li>
                <li><a href="about.html" data-section="about">About Us</a></li>
                <li><a href="contact.html" data-section="contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="profile-section">
            <div class="profile-container">
                <div class="breadcrumb">
                    <span class="breadcrumb-item" onclick="window.location.href='index.html'">Home</span>
                    <span class="breadcrumb-separator">></span>
                    <span class="breadcrumb-item" onclick="window.location.href='profile.html'">Profile</span>
                    <span class="breadcrumb-separator">></span>
                    <span class="breadcrumb-item current">My Coupons</span>
                </div>

                <div class="coupons-content" style="margin-top: 30px; text-align: center; padding: 40px;">
                    <i class="fas fa-ticket-alt" style="font-size: 48px; color: #fc6e20; margin-bottom: 20px;"></i>
                    <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 10px;">My Coupons</h2>
                    <p style="color: #666;">You don't have any active coupons right now.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <div class="mobile-nav-bg">
            <svg viewBox="0 0 400 80" preservedAspectRatio="none">
                <path d="M 0 20 
                         Q 0 0 20 0 
                         L 145 0 
                         Q 165 0 165 20 
                         A 35 35 0 0 0 235 20 
                         Q 235 0 255 0 
                         L 380 0 
                         Q 400 0 400 20 
                         L 400 80 
                         L 0 80 
                         Z" filter="url(#shadow)" />
                <defs>
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
                        <feOffset dx="0" dy="4" result="offsetblur" />
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.1" />
                        </feComponentTransfer>
                        <feMerge>
                            <feMergeNode />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
            </svg>
        </div>
        <div class="mobile-nav-icons">
            <a href="index.html" data-section="home" title="Home">
                <i class="fas fa-home"></i>
                <div class="active-dot"></div>
            </a>
            <a href="wishlist.html" data-section="wishlist" title="Wishlist">
                <i class="fas fa-heart"></i>
                <div class="active-dot"></div>
            </a>

            <div class="nav-extra-space"></div> <!-- Space for the cutout -->

            <a href="search.html" data-section="search" title="Search" class="nav-item-special">
                <i class="fas fa-search"></i>
            </a>

            <a href="cart.html" data-section="cart" title="Cart">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count">0</span>
                <div class="active-dot"></div>
            </a>
            <a href="login.html" data-section="profile" title="Profile">
                <i class="fas fa-user"></i>
                <div class="active-dot"></div>
            </a>
        </div>
    </nav>

    <script src="js/script.js"></script>
    <script type="module" src="js/auth-state.js"></script>
    <script type="module" src="js/cart-count.js"></script>
</body>

</html>
