<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coupons - Maharaja Dry Fruits</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="MAHARAJA logo.svg">
    
    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8KQYRHMSKN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8KQYRHMSKN');
    </script>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Lordicon -->
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
</head>

<body data-page="coupons">
    
    <header class="header">
        <div class="top-header">
            <div class="header-left">
                <div class="logo-container">
                    <img src="assets/MAHARAJA logo.png" alt="Maharaja Logo" class="logo">
                </div>
                <div class="brand-name">
                    <h1>MAHARAJA</h1>
                    <p class="tagline">Dry Fruit</p>
                </div>
            </div>
            <div class="header-search-bar">
                <form action="search.html" method="get">
                    <input type="text" name="q" class="header-search-input" placeholder="Search for dry fruits, nuts, seeds..." required>
                    <button type="submit" class="header-search-btn"><lord-icon src="https://cdn.lordicon.com/vayiyuqd.json" trigger="hover" colors="primary:#ffffff" style="width:20px;height:20px"></lord-icon></button>
                </form>
            </div>
            <div class="header-icons">
                <a href="wishlist.html" class="icon" data-section="wishlist"><lord-icon src="https://cdn.lordicon.com/yucrjnnl.json" trigger="hover" colors="primary:#ffffff" style="width:20px;height:20px"></lord-icon></a>
                <a href="cart.html" class="icon" data-section="cart">
                    <lord-icon src="https://cdn.lordicon.com/fmsilsqx.json" trigger="hover" colors="primary:#ffffff" style="width:20px;height:20px"></lord-icon>
                    <span class="cart-count">0</span>
                </a>
                <a href="login.html" class="icon" data-section="profile"><lord-icon src="https://cdn.lordicon.com/spzqjmbt.json" trigger="hover" colors="primary:#ffffff" style="width:20px;height:20px"></lord-icon></a>
            </div>
        </div>
        <nav class="main-nav">
            <ul class="nav-links">
                <li><a href="index.html" data-section="home">Home</a></li>
                <li class="dropdown">
                    <a href="search.html" class="dropbtn">Shop <i class="fas fa-chevron-down"></i></a>
                    <div class="dropdown-content">
                        <a href="search.html" class="dropdown-item">
                            <i class="fas fa-th-large"></i>
                            <span>All</span>
                        </a>
                        <a href="search.html?category=Almonds" class="dropdown-item">
                            <i class="fas fa-seedling"></i>
                            <span>Almonds</span>
                        </a>
                        <a href="search.html?category=Walnuts" class="dropdown-item">
                            <i class="fas fa-circle"></i>
                            <span>Walnuts</span>
                        </a>
                        <a href="search.html?category=Cashews" class="dropdown-item">
                            <i class="fas fa-leaf"></i>
                            <span>Cashews</span>
                        </a>
                        <a href="search.html?category=Pistachios" class="dropdown-item">
                            <i class="fas fa-spa"></i>
                            <span>Pistachios</span>
                        </a>
                        <a href="search.html?category=Other Dry Fruits" class="dropdown-item">
                            <i class="fas fa-basket-shopping"></i>
                            <span>More</span>
                        </a>
                    </div>
                </li>
                <li><a href="about.html" data-section="about">About Us</a></li>
                <li><a href="contact.html" data-section="contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="profile-section">
            <div class="profile-container">
                <div class="breadcrumb" id="breadcrumb">
                    <span class="breadcrumb-item" data-section="home">Home</span>
                    <span class="breadcrumb-separator">&gt;</span>
                    <span class="breadcrumb-item" data-section="profile">Profile</span>
                    <span class="breadcrumb-separator">&gt;</span>
                    <span class="breadcrumb-item current">My Coupons</span>
                </div>

                <div class="coupons-content" style="margin-top: 30px; text-align: center; padding: 20px;">
                    <div id="couponsList" style="display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: 0 auto; text-align: left;">
                        <div style="padding: 40px; text-align: center;">Loading your coupons...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <div class="mobile-nav-bg">
            <svg viewBox="0 0 400 80" preservedAspectRatio="none">
                <path d="M 0 20 
                         Q 0 0 20 0 
                         L 145 0 
                         Q 165 0 165 20 
                         A 35 35 0 0 0 235 20 
                         Q 235 0 255 0 
                         L 380 0 
                         Q 400 0 400 20 
                         L 400 80 
                         L 0 80 
                         Z" filter="url(#shadow)" />
                <defs>
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
                        <feOffset dx="0" dy="4" result="offsetblur" />
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.1" />
                        </feComponentTransfer>
                        <feMerge>
                            <feMergeNode />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
            </svg>
        </div>
        <div class="mobile-nav-icons">
            <a href="index.html" data-section="home" title="Home">
                <lord-icon src="https://cdn.lordicon.com/ewtxwele.json" trigger="hover" colors="primary:#ffffff" style="width:24px;height:24px"></lord-icon>
                <div class="active-dot"></div>
            </a>
            <a href="wishlist.html" data-section="wishlist" title="Wishlist">
                <lord-icon src="https://cdn.lordicon.com/yucrjnnl.json" trigger="hover" colors="primary:#ffffff" style="width:24px;height:24px"></lord-icon>
                <div class="active-dot"></div>
            </a>

            <div class="nav-extra-space"></div> <!-- Space for the cutout -->

            <a href="search.html" data-section="search" title="Search" class="nav-item-special">
                <lord-icon src="https://cdn.lordicon.com/vayiyuqd.json" trigger="hover" colors="primary:#ffffff" style="width:20px;height:20px"></lord-icon>
            </a>

            <a href="cart.html" data-section="cart" title="Cart">
                <lord-icon src="https://cdn.lordicon.com/fmsilsqx.json" trigger="hover" colors="primary:#ffffff" style="width:24px;height:24px"></lord-icon>
                <span class="cart-count">0</span>
                <div class="active-dot"></div>
            </a>
            <a href="profile.html" data-section="profile" class="mobile-profile-btn-wrapper" title="Profile">
                <span class="mobile-profile-btn"><lord-icon src="https://cdn.lordicon.com/spzqjmbt.json" trigger="hover" colors="primary:#ffffff" style="width:26px;height:26px"></lord-icon></span>
                <div class="active-dot"></div>
            </a>
        </div>
    </nav>

    <script src="js/script.js"></script>
    <script type="module" src="js/auth-state.js"></script>
    <script type="module" src="js/cart-count.js"></script>
    <script type="module" src="js/coupons.js"></script>
    <script src="js/cursor-effect.js"></script>
</body>

</html>
